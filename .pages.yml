media:
  input: public/assets
  output: /assets

content:
  - name: blog
    label: Blog Posts
    type: collection
    path: src/content/posts
    view:
      fields: [title, pubDatetime, draft, featured]
      sort: [pubDatetime]
      default:
        sort: pubDatetime
        order: desc
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: pubDatetime
        label: Publish Date
        type: date
        required: true
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm:ssXXX
      - name: modDatetime
        label: Modified Date
        type: date
        options:
          time: true
          format: yyyy-MM-dd'T'HH:mm:ssXXX
      - name: author
        label: Author
        type: string
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: draft
        label: Draft
        type: boolean
        default: false
      - name: tags
        label: Tags
        type: string
        list: true
        default: [others]
      - name: canonicalURL
        label: Canonical URL
        type: string
      - name: hideEditPost
        label: Hide Edit Post Link
        type: boolean
      - name: timezone
        label: Timezone
        type: select
        default: Australia/Brisbane
        options:
          values:
            - value: Australia/Brisbane
              label: Brisbane / Gold Coast (AEST)
            - value: UTC
              label: UTC
      - name: body
        label: Body
        type: rich-text